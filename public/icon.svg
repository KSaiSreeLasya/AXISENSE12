<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#2563eb"/>
  
  <!-- Axis lines representing fleet/navigation -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round">
    <!-- X axis -->
    <line x1="12" y1="32" x2="52" y2="32"/>
    <!-- Y axis -->
    <line x1="32" y1="12" x2="32" y2="52"/>
  </g>
  
  <!-- Center point -->
  <circle cx="32" cy="32" r="3" fill="white"/>
  
  <!-- Data points representing connected fleet -->
  <circle cx="20" cy="20" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="44" cy="20" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="20" cy="44" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="44" cy="44" r="2.5" fill="white" opacity="0.8"/>
</svg>
